name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master]

jobs:
  # ─── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install package dependencies
        run: |
          npm ci --prefix packages/driver
          npm ci --prefix packages/framework
          npm ci --prefix packages/connex

      - name: Run unit tests
        run: npm test

  # ─── Integration Tests ───────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (thor-solo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Start thor-solo
        run: |
          docker run -d --name thor-solo \
            -p 8669:8669 \
            vechain/thor:latest solo --api-cors '*' --api-addr 0.0.0.0:8669 --api-timeout 60

      - name: Wait for thor-solo
        run: |
          for i in $(seq 1 30); do
            wget -qO- http://localhost:8669/blocks/0 && break
            sleep 2
          done

      - name: Install root dependencies
        run: npm ci

      - name: Install package dependencies
        run: |
          npm ci --prefix packages/driver
          npm ci --prefix packages/framework

      - name: Run integration tests
        run: npm run test:integration
        env:
          THOR_SOLO_URL: http://localhost:8669

  # ─── Browser Bundle Tests ────────────────────────────────────────────────────
  browser-tests:
    name: Browser Bundle Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install package dependencies
        run: |
          npm ci --prefix packages/driver
          npm ci --prefix packages/framework
          npm ci --prefix packages/connex

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build connex UMD bundle
        run: npm run build
        working-directory: packages/connex

      - name: Run browser bundle tests
        run: npm run test:browser

  # ─── Browser Testnet Tests ───────────────────────────────────────────────────
  browser-testnet-tests:
    name: Browser Testnet Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install package dependencies
        run: |
          npm ci --prefix packages/driver
          npm ci --prefix packages/framework
          npm ci --prefix packages/connex

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build connex bundle
        run: npm run build
        working-directory: packages/connex

      - name: Run browser testnet tests
        run: npm run test:browser:testnet
